<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Composição de Receita</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <style>
    .icon { width: 1.1rem; height: 1.1rem; margin-right: 0.4rem; vertical-align: text-bottom; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background-color 0.2s ease, color 0.2s ease;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
    }
    .nav-link:hover {
      background-color: #000;
      color: #fff !important;
    }
    .btn-sm {
      font-size: 0.875rem;
      padding: 0.4rem 0.75rem;
    }

    ul {
      list-style-type: none;
      padding-left: 20px;
    }
    .node {
      margin-bottom: 1rem;
    }
    .collapsed > ul {
      display: none;
    }
    .toggle.has-children::before {
      content: '▶';
      margin-right: 8px;
    }
    .expanded > .card > .card-body > .toggle.has-children::before {
      content: '▼';
    }
    .level-0 .card { background-color: #f8d7da; }
    .level-1 .card { background-color: #d1ecf1; }
    .level-2 .card { background-color: #d4edda; }
    .level-3 .card { background-color: #fff3cd; }
    .quantity-actual {
      font-weight: bold;
    }
  </style>
</head>
<body class="bg-light" onload="lucide.createIcons()">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    <div class="container">
      <span class="navbar-brand d-flex align-items-center">
        <i data-lucide="fork-knife" class="icon"></i>
        <strong>Recipe Manager</strong>
      </span>
      <div class="d-flex">
        <a class="nav-link text-dark" href="/home"><i data-lucide="home" class="icon"></i><span>Home</span></a>
        <a class="nav-link text-dark" href="/insumos"><i data-lucide="package" class="icon"></i><span>Insumos</span></a>
        <a class="nav-link text-white bg-dark" href="/receitas"><i data-lucide="book-open" class="icon"></i><span>Receitas</span></a>
      </div>
    </div>
  </nav>


  <div class="container py-4">
    <h2 class="mb-4">Composição de Receita</h2>

    <div class="mb-4">
      <button id="expandAll" class="btn btn-success me-2">Expandir tudo</button>
      <button id="collapseAll" class="btn btn-secondary">Recolher tudo</button>
    </div>

    <div id="hierarchy-container" class="mb-5"></div>

    <h4>Insumos Utilizados</h4>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Receita Principal</th>
          <th>Insumo</th>
          <th>Quantidade (kg)</th>
        </tr>
      </thead>
      <tbody id="leaf-table-body"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const id = {{ id }};
    const data = {{ data | tojson }};
  </script>
  <script src="/static/script.js"></script>

</body>
</html>
