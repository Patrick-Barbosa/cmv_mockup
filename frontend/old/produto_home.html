<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
      .icon { width: 1.1rem; height: 1.1rem; margin-right: 0.4rem; vertical-align: text-bottom; }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: background-color 0.2s ease, color 0.2s ease;
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
      }
      .nav-link:hover {
        background-color: #000;
        color: #fff !important;
      }
      .btn-sm {
        font-size: 0.875rem;
        padding: 0.4rem 0.75rem;
      }
    </style>
  </head>
  <body class="bg-light" onload="lucide.createIcons()">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
      <div class="container">
        <span class="navbar-brand d-flex align-items-center">
          <i data-lucide="fork-knife" class="icon"></i>
          <strong>Recipe Manager</strong>
        </span>
        <div class="d-flex">
          <a class="nav-link text-dark" href="/home"><i data-lucide="home" class="icon"></i><span>Home</span></a>
          <a class="nav-link text-white bg-dark" href="/insumos"><i data-lucide="package" class="icon"></i><span>Insumos</span></a>
          <a class="nav-link text-dark" href="/receitas"><i data-lucide="book-open" class="icon"></i><span>Receitas</span></a>
        </div>
      </div>
    </nav>

    <div id="listProductView" class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Insumos</h3>
        <!-- <button class="btn btn-dark btn-sm" onclick="showCreateProduct()"><i data-lucide="plus" class="icon"></i> Add Product</button> -->
      </div>

      <div class="table-responsive">
        <table class="table table-bordered table-hover bg-white">
          <thead class="table-light">
            <tr>
              <th>Id</th>
              <th>Nome</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for produto in produtos %}
                <tr>
                    <td>{{ produto.id }}</td>
                    <td>{{ produto.nome|e }}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary"><i data-lucide="edit" class="icon"></i>Edit</button>
                        <button class="btn btn-sm btn-outline-danger"><i data-lucide="trash" class="icon"></i>Delete</button>
                    </td>
                </tr>
            {% else %}
                <li>Nenhum insumo encontrado.</li>
            {% endfor %}
          </tbody>
        </table>
      </div>


    </div>

    <!-- style="display: none !important;" -->
    <div id="createProductView" class="container d-flex justify-content-center align-items-center py-5">
      <div class="card shadow p-4" style="max-width: 480px; width: 100%;">
        <h5 class="fw-bold mb-3">Add New Product</h5>
        <form action="product/create" method="POST" onsubmit="handleProductSubmit(event)">
          <!-- Nome -->
          <div class="mb-3">
            <label for="nome" class="form-label">Product Name</label>
            <input name="nome" type="text" class="form-control" id="nome" placeholder="e.g., Flour, Sugar, Eggs" />
          </div>

          <!-- Base Unit -->
          <!-- <div class="mb-3">
            <label for="baseUnit" class="form-label">Base Unit</label>
            <input name="baseUnit" type="text" class="form-control" id="baseUnit" placeholder="e.g., g, ml, pcs" />
            <div class="form-text">
              The standard unit of measurement for this product (e.g., grams, milliliters, pieces)
            </div>
          </div> -->
          
          <div class="d-flex justify-content-between">
            <!-- <button type="button" class="btn btn-outline-dark">Cancel</button> -->
            <button type="submit" class="btn btn-dark">Create Product</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="text-center text-muted small mt-5">Recipe Management Application © 2025</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      async function handleProductSubmit(event) {
        event.preventDefault();
        
        const nome = document.getElementById("nome").value;

        // monta o objeto que será enviado
        const payload = {
          nome: nome
        };
        console.log(payload);

        try {
          const response = await fetch("/api/insumos/create", {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            // lê corpo de erro, se retornar JSON
            let errMsg = `Status ${response.status}`;
            try {
              const errBody = await response.json();
              errMsg += ` – ${errBody.message || JSON.stringify(errBody)}`;
            } catch {}
            throw new Error(errMsg);
          }

          window.location.reload();

          // const data = await response.json();
          // console.log('Insumo created on server:', data);
          // alert('Insumo created successfully!');

        } catch (err) {
          console.error('Failed to create Insumo:', err);
          alert(`Erro ao criar Insumo: ${err.message}`);
        }
      };
    </script>
  </body>
</html>
