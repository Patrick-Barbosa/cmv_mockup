<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe da Receita — Prato</title>
  <meta name="description" content="Visualize a composição completa de uma receita de forma recursiva." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-bg': '#111307', 'brand-surface': '#16190B',
            'brand-surface-2': '#1B1F0F', 'brand-primary': '#5E6F37',
            'brand-highlight': '#8CB84F', 'brand-secondary': '#C94CB6',
            'brand-text': '#F5F4EE', 'brand-soft': '#C9C7BA',
            'brand-muted': '#9B9888', 'brand-line': '#6E725E',
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        },
      },
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    .nav-link {
      display: flex; align-items: center; gap: .625rem;
      padding: .5rem .75rem; border-radius: 2px;
      color: #9B9888; font-size: .82rem; font-weight: 500;
      transition: color .18s, background-color .18s; text-decoration: none;
    }
    .nav-link:hover { color: #C9C7BA; background-color: rgba(110,114,94,.08); }
    .nav-link.active { color: #8CB84F; background-color: rgba(140,184,79,.08); }

    /* ── Tree styles ────────────────────────────────────────── */
    .tree-node { position: relative; }
    .tree-children { margin-left: 1.25rem; border-left: 1px solid rgba(110,114,94,.15); }
    .tree-item {
      display: flex; align-items: center; gap: .5rem;
      padding: .55rem .75rem;
      border-bottom: 1px solid rgba(110,114,94,.06);
      transition: background-color .12s;
      cursor: default;
    }
    .tree-item:hover { background-color: rgba(110,114,94,.04); }
    .tree-item.is-recipe { cursor: pointer; }
    .tree-item.is-recipe:hover { background-color: rgba(140,184,79,.06); }

    .tree-toggle {
      width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid rgba(110,114,94,.3); border-radius: 2px;
      color: #9B9888; cursor: pointer; transition: all .15s; flex-shrink: 0;
      padding: 0; line-height: 0;
    }
    .tree-toggle:hover { border-color: #8CB84F; color: #8CB84F; }
    .tree-toggle.open { background: rgba(140,184,79,.1); border-color: rgba(140,184,79,.3); color: #8CB84F; }
    .tree-toggle svg { transition: transform .15s; }
    .tree-toggle.open svg { transform: rotate(90deg); }

    .tree-icon-insumo { color: #9B9888; flex-shrink: 0; }
    .tree-icon-receita { color: #8CB84F; flex-shrink: 0; }

    .tree-meta {
      margin-left: auto; display: flex; align-items: center; gap: 1rem;
      font-size: .78rem; white-space: nowrap;
    }

    /* ── Summary table ─────────────────────────────────────── */
    .summary-table { width: 100%; border-collapse: collapse; }
    .summary-table th {
      text-align: left; padding: .5rem .75rem; color: #9B9888;
      font-size: .68rem; font-weight: 500; letter-spacing: .06em;
      text-transform: uppercase; border-bottom: 1px solid rgba(110,114,94,.2);
    }
    .summary-table th:last-child { text-align: right; }
    .summary-table td {
      padding: .55rem .75rem; font-size: .82rem; color: #F5F4EE;
      border-bottom: 1px solid rgba(110,114,94,.08);
    }
    .summary-table td:last-child { text-align: right; }
    .summary-table tbody tr:last-child td { border-bottom: none; }
    .summary-table tfoot td {
      padding: .65rem .75rem; font-weight: 600;
      border-top: 1px solid rgba(110,114,94,.25);
    }

    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      display: flex; align-items: center; gap: .625rem;
      padding: .75rem 1.125rem; border-radius: 2px;
      font-size: .82rem; font-weight: 500;
      opacity: 0; pointer-events: none; transform: translateY(6px);
      transition: opacity .28s ease, transform .28s ease; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #toast.success { background: #1B1F0F; border: 1px solid rgba(140,184,79,.35); color: #8CB84F; }
    #toast.error { background: #1B1F0F; border: 1px solid rgba(200,80,80,.35); color: rgba(220,110,110,.9); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(140,184,79,.2); border-top-color: #8CB84F; border-radius: 50%; animation: spin .7s linear infinite; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn .3s ease forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(110,114,94,.3); border-radius: 3px; }
  </style>
</head>

<body class="bg-brand-bg text-brand-text antialiased font-sans min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="hidden md:flex flex-col w-52 shrink-0 border-r border-brand-line/20 bg-brand-surface min-h-screen sticky top-0 h-screen overflow-y-auto">
    <div class="px-5 py-6 border-b border-brand-line/15">
      <a href="../index.html" class="text-brand-text font-semibold tracking-[0.2em] text-sm uppercase select-none hover:text-brand-highlight transition-colors">Prato</a>
    </div>
    <nav class="px-3 py-5 flex flex-col gap-0.5 flex-1">
      <p class="text-brand-muted text-[0.65rem] tracking-[0.15em] uppercase font-medium px-3 mb-2">Operação</p>
      <a href="insumos.html" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx=".5" stroke="currentColor" stroke-width="1.3"/><path d="M4.5 7h5M7 4.5v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Insumos
      </a>
      <a href="receitas.html" class="nav-link active">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx=".5" stroke="currentColor" stroke-width="1.3"/><path d="M3.5 4.5h7M3.5 7h7M3.5 9.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Receitas
      </a>
      <div class="border-t border-brand-line/15 my-4"></div>
      <p class="text-brand-muted text-[0.65rem] tracking-[0.15em] uppercase font-medium px-3 mb-2">Análise</p>
      <a href="#" class="nav-link" style="opacity:.5;pointer-events:none;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10.5L5 7.5L7.5 9.5L12 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        CMV
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="flex-1 flex flex-col min-h-screen">
    <header class="flex items-center justify-between px-6 md:px-10 py-4 border-b border-brand-line/15">
      <a href="receitas.html" class="inline-flex items-center gap-2 text-brand-muted text-sm hover:text-brand-highlight transition-colors">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Voltar para receitas
      </a>
    </header>

    <main class="flex-1 px-6 md:px-10 py-8 max-w-5xl w-full mx-auto">

      <!-- Loading -->
      <div id="loading-state" class="flex items-center justify-center py-24 gap-3">
        <div class="spinner"></div>
        <p class="text-brand-muted text-sm">Carregando receita…</p>
      </div>

      <!-- Content (hidden until loaded) -->
      <div id="content" class="hidden">
        <!-- Header -->
        <div class="mb-8 fade-in">
          <h1 id="receita-nome" class="text-brand-text text-xl font-semibold mb-1"></h1>
          <p id="receita-info" class="text-brand-muted text-sm"></p>
        </div>

        <!-- Two columns -->
        <div class="grid lg:grid-cols-3 gap-6">

          <!-- LEFT: Tree view (2 cols) -->
          <div class="lg:col-span-2 fade-in" style="animation-delay:.08s">
            <div class="bg-brand-surface-2 border border-brand-line/20 rounded-sm overflow-hidden">
              <div class="px-6 py-4 border-b border-brand-line/15 flex items-center justify-between">
                <h2 class="text-brand-soft text-sm font-medium">Composição da receita</h2>
                <div class="flex items-center gap-3">
                  <button onclick="expandAll()" class="text-brand-muted text-xs hover:text-brand-highlight transition-colors">Expandir tudo</button>
                  <span class="text-brand-line/30">|</span>
                  <button onclick="collapseAll()" class="text-brand-muted text-xs hover:text-brand-highlight transition-colors">Recolher tudo</button>
                </div>
              </div>
              <div id="tree-container" class="p-2"></div>
            </div>
          </div>

          <!-- RIGHT: Summary cards -->
          <div class="flex flex-col gap-4 fade-in" style="animation-delay:.16s">
            <!-- Cost total card -->
            <div class="bg-brand-surface-2 border border-brand-line/20 rounded-sm p-5">
              <p class="text-brand-muted text-[0.7rem] tracking-[0.12em] uppercase font-medium mb-3">Custo total</p>
              <p id="custo-total" class="text-brand-highlight text-3xl font-light tabular-nums">—</p>
            </div>

            <!-- Insumos summary -->
            <div class="bg-brand-surface-2 border border-brand-line/20 rounded-sm overflow-hidden">
              <div class="px-5 py-3 border-b border-brand-line/15">
                <p class="text-brand-muted text-[0.7rem] tracking-[0.12em] uppercase font-medium">Todos os insumos (folha)</p>
              </div>
              <div class="p-3">
                <table class="summary-table">
                  <thead>
                    <tr>
                      <th>Insumo</th>
                      <th>Qtd</th>
                      <th>Custo</th>
                    </tr>
                  </thead>
                  <tbody id="summary-body"></tbody>
                  <tfoot>
                    <tr>
                      <td colspan="2" class="text-brand-muted text-xs">Total</td>
                      <td id="summary-total" class="text-brand-highlight tabular-nums"></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          </div>

        </div>
      </div>

    </main>

    <footer class="py-5 px-6 md:px-10 border-t border-brand-line/15">
      <p class="text-brand-muted text-xs">© 2025 Prato — Inteligência de margem para restaurantes.</p>
    </footer>
  </div>

  <div id="toast" role="alert" aria-live="polite">
    <span id="toast-icon"></span>
    <span id="toast-msg"></span>
  </div>

  <script>
    const API = 'http://localhost:8000';
    let receitaData = null;
    let toastTimer = null;

    // ── Utils ─────────────────────────────────────────────────────────
    function formatBRL(v) {
      const n = parseFloat(v);
      if (isNaN(n)) return '—';
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.className = `${type} show`;
      document.getElementById('toast-icon').textContent = type === 'success' ? '✓' : '✕';
      document.getElementById('toast-msg').textContent = msg;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
    }

    // ── Get receita ID from URL ────────────────────────────────────────
    function getReceitaId() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id'), 10);
    }

    // ── Load recipe data ──────────────────────────────────────────────
    async function loadReceita() {
      const id = getReceitaId();
      if (!id || isNaN(id)) {
        showToast('ID de receita inválido.', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/receitas/${id}`);
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        receitaData = await res.json();

        document.getElementById('receita-nome').textContent = receitaData.nome;
        document.getElementById('receita-info').textContent =
          `Rendimento: ${receitaData.quantidade || '—'} ${receitaData.unidade || ''} · Tipo: ${receitaData.tipo}`;

        renderTree(receitaData);
        renderSummary(receitaData);

        document.title = `${receitaData.nome} — Prato`;
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      } catch (e) {
        document.getElementById('loading-state').innerHTML = `
          <div class="text-center">
            <p class="text-red-400 text-sm mb-2">Não foi possível carregar a receita.</p>
            <p class="text-brand-muted text-xs">${e.message}</p>
            <a href="receitas.html" class="text-brand-highlight text-sm mt-4 inline-block hover:underline">← Voltar para receitas</a>
          </div>`;
      }
    }

    // ── Render tree ───────────────────────────────────────────────────
    function renderTree(data) {
      const container = document.getElementById('tree-container');
      container.innerHTML = renderNode(data, 0, true);
    }

    function renderNode(node, depth, isRoot = false) {
      const isRecipe = node.tipo === 'receita';
      const hasChildren = node.children && node.children.length > 0;
      const nodeId = `node-${depth}-${node.id}-${Math.random().toString(36).slice(2, 6)}`;

      // Cost calculation for this node
      let nodeCost = '';
      if (isRecipe && hasChildren) {
        const cost = calcNodeCost(node);
        nodeCost = `<span class="text-brand-highlight tabular-nums font-medium text-xs">${formatBRL(cost)}</span>`;
      } else if (!isRecipe && node.custo != null) {
        const cost = node.custo * (node.quantidade || 0);
        nodeCost = `<span class="text-brand-highlight tabular-nums font-medium text-xs">${formatBRL(cost)}</span>`;
      }

      const toggleBtn = isRecipe && hasChildren
        ? `<button class="tree-toggle open" onclick="toggleNode('${nodeId}', this)" title="Expandir/Recolher">
             <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 1l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
           </button>`
        : `<span style="width:18px;display:inline-block;"></span>`;

      const icon = isRecipe
        ? `<svg class="tree-icon-receita" width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx=".5" stroke="currentColor" stroke-width="1.3"/><path d="M3.5 4.5h7M3.5 7h7M3.5 9.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`
        : `<svg class="tree-icon-insumo" width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="1.5" fill="currentColor"/></svg>`;

      const typeBadge = isRecipe
        ? `<span class="px-1.5 py-0.5 bg-brand-primary/15 text-brand-highlight text-[0.65rem] font-medium rounded-sm border border-brand-primary/20">receita</span>`
        : `<span class="px-1.5 py-0.5 bg-brand-surface text-brand-muted text-[0.65rem] font-medium rounded-sm border border-brand-line/20">insumo</span>`;

      const qtyDisplay = node.quantidade != null
        ? `<span class="text-brand-muted tabular-nums text-xs">${parseFloat(node.quantidade.toFixed(4))} ${node.unidade || ''}</span>`
        : '';

      const childrenHTML = hasChildren
        ? `<div class="tree-children" id="${nodeId}">${node.children.map(c => renderNode(c, depth + 1)).join('')}</div>`
        : '';

      return `
        <div class="tree-node">
          <div class="tree-item ${isRecipe ? 'is-recipe' : ''}">
            ${toggleBtn}
            ${icon}
            <span class="${isRecipe ? 'text-brand-soft font-medium' : 'text-brand-text'} text-sm">${node.nome}</span>
            ${typeBadge}
            <div class="tree-meta">
              ${qtyDisplay}
              ${nodeCost}
            </div>
          </div>
          ${childrenHTML}
        </div>`;
    }

    function calcNodeCost(node) {
      if (!node.children || node.children.length === 0) {
        return (node.custo || 0) * (node.quantidade || 0);
      }
      return node.children.reduce((sum, child) => sum + calcNodeCost(child), 0);
    }

    function toggleNode(nodeId, btn) {
      const el = document.getElementById(nodeId);
      if (!el) return;
      const isHidden = el.style.display === 'none';
      el.style.display = isHidden ? '' : 'none';
      btn.classList.toggle('open', isHidden);
    }

    function expandAll() {
      document.querySelectorAll('.tree-children').forEach(el => el.style.display = '');
      document.querySelectorAll('.tree-toggle').forEach(btn => btn.classList.add('open'));
    }

    function collapseAll() {
      document.querySelectorAll('.tree-children').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tree-toggle').forEach(btn => btn.classList.remove('open'));
    }

    // ── Render insumo summary ─────────────────────────────────────────
    function renderSummary(data) {
      // Collect all leaf insumos recursively
      const insumos = {};
      collectInsumos(data, insumos);

      const entries = Object.values(insumos).sort((a, b) => b.custoTotal - a.custoTotal);
      const grandTotal = entries.reduce((s, e) => s + e.custoTotal, 0);

      document.getElementById('custo-total').textContent = formatBRL(grandTotal);

      const tbody = document.getElementById('summary-body');
      tbody.innerHTML = entries.map(e => `
        <tr>
          <td>
            <span class="text-brand-soft text-sm">${e.nome}</span>
            <span class="text-brand-muted text-xs ml-1">(${e.unidade || '—'})</span>
          </td>
          <td class="text-brand-muted tabular-nums text-sm">${parseFloat(e.qtdTotal.toFixed(4))}</td>
          <td><span class="text-brand-highlight tabular-nums font-medium text-sm">${formatBRL(e.custoTotal)}</span></td>
        </tr>`).join('');

      document.getElementById('summary-total').textContent = formatBRL(grandTotal);
    }

    function collectInsumos(node, acc) {
      if (!node.children || node.children.length === 0) {
        // Leaf node = insumo
        if (node.tipo === 'insumo') {
          const key = `${node.id}-${node.unidade}`;
          const custo = (node.custo || 0) * (node.quantidade || 0);
          if (acc[key]) {
            acc[key].qtdTotal += (node.quantidade || 0);
            acc[key].custoTotal += custo;
          } else {
            acc[key] = {
              nome: node.nome,
              unidade: node.unidade,
              qtdTotal: node.quantidade || 0,
              custoTotal: custo,
            };
          }
        }
        return;
      }
      for (const child of node.children) {
        collectInsumos(child, acc);
      }
    }

    // ── Init ──────────────────────────────────────────────────────────
    loadReceita();
  </script>
</body>
</html>
